version: '3.8'

services:
  api:
    build: .
    container_name: gridsphere_api
    restart: always
    ports:
      - "8001:8000"
    environment:
      # --- UPDATE WITH YOUR EXACT NEON DB URL ---
      # Example: postgresql+asyncpg://[user]:[password]@[endpoint].neon.tech/[dbname]?sslmode=require
      - DATABASE_URL=postgresql+asyncpg://YOUR_NEON_USER:YOUR_NEON_PASSWORD@YOUR_NEON_ENDPOINT/gridsphere?sslmode=require
      
      # --- UPDATE THESE TO MATCH YOUR EXISTING MQTT BROKER ---
      - MQTT_BROKER=mqtt.gridsphere.in 
      - MQTT_PORT=1883
      - MQTT_USER=esp8266
      - MQTT_PASS=strongpassword123